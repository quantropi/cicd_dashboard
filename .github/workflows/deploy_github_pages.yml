name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:
  
  repository_dispatch:
    types: 
      - deoloy_pages

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci
      
      - name: Build project
        run: npx --no-install npm run build
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./build
          
  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5